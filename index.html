<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Shachi BTC Dashboard</title>
    <link rel="icon" type="image/png" href="https://shachi.mx/assets/shachi-logo-DJDvd-OT.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1929 0%, #0d2137 50%, #0f2744 100%);
            color: #e3f2fd;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header .logo {
            width: 80px;
            height: auto;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6, #03a9f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #64b5f6;
            font-size: 1.1em;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(79, 195, 247, 0.08);
            border: 1px solid rgba(79, 195, 247, 0.2);
            color: #90caf9;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }

        .tab-btn:hover {
            background: rgba(79, 195, 247, 0.15);
            color: #4fc3f7;
            border-color: rgba(79, 195, 247, 0.4);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #0288d1, #03a9f4, #29b6f6);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(3, 169, 244, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(13, 33, 55, 0.9), rgba(10, 25, 41, 0.95));
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(79, 195, 247, 0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(3, 169, 244, 0.25);
            border-color: rgba(79, 195, 247, 0.3);
        }

        .stat-card .value {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            color: #90caf9;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card.positive .value { color: #4caf50; }
        .stat-card.negative .value { color: #f44336; }
        .stat-card.neutral .value { color: #29b6f6; }

        .chart-card {
            background: linear-gradient(145deg, rgba(13, 33, 55, 0.9), rgba(10, 25, 41, 0.95));
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(79, 195, 247, 0.15);
            margin-bottom: 30px;
        }

        .chart-card h2 {
            margin-bottom: 20px;
            color: #4fc3f7;
            font-size: 1.3em;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
        }

        .chart-wrapper.small {
            height: 250px;
        }

        .two-charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .three-charts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .three-charts {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 900px) {
            .two-charts, .three-charts {
                grid-template-columns: 1fr;
            }
        }

        /* Correlation Section */
        .correlation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .correlation-item {
            background: rgba(13, 33, 55, 0.6);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(79, 195, 247, 0.1);
        }

        .correlation-bar-container {
            flex: 1;
            height: 8px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .correlation-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }

        .correlation-bar.positive {
            background: linear-gradient(90deg, #4caf50, #81c784);
        }

        .correlation-bar.negative {
            background: linear-gradient(90deg, #f44336, #e57373);
        }

        .correlation-value {
            font-size: 1.2em;
            font-weight: bold;
            min-width: 70px;
            text-align: right;
        }

        .correlation-value.positive { color: #4caf50; }
        .correlation-value.negative { color: #f44336; }

        .correlation-name {
            min-width: 150px;
            color: #b3e5fc;
        }

        .correlation-strength {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .correlation-strength.strong { background: rgba(76, 175, 80, 0.2); color: #81c784; }
        .correlation-strength.moderate { background: rgba(255, 183, 77, 0.2); color: #ffb74d; }
        .correlation-strength.weak { background: rgba(144, 202, 249, 0.15); color: #90caf9; }

        /* Indicator Cards */
        .indicator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .indicator-card {
            background: rgba(13, 33, 55, 0.6);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(79, 195, 247, 0.1);
        }

        .indicator-card h3 {
            color: #4fc3f7;
            margin-bottom: 15px;
            font-size: 1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .indicator-card .corr-badge {
            font-size: 0.8em;
            padding: 3px 8px;
            border-radius: 10px;
        }

        .indicator-card .corr-badge.positive { background: rgba(76, 175, 80, 0.2); color: #81c784; }
        .indicator-card .corr-badge.negative { background: rgba(244, 67, 54, 0.2); color: #e57373; }

        /* Table Styles */
        .table-card {
            background: linear-gradient(145deg, rgba(13, 33, 55, 0.9), rgba(10, 25, 41, 0.95));
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(79, 195, 247, 0.15);
            overflow-x: auto;
            margin-top: 30px;
        }

        .table-card h2 {
            margin-bottom: 20px;
            color: #4fc3f7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(79, 195, 247, 0.1);
        }

        th {
            background: rgba(3, 169, 244, 0.15);
            color: #4fc3f7;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: rgba(79, 195, 247, 0.05);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge.long { background: rgba(76, 175, 80, 0.2); color: #81c784; }
        .badge.short { background: rgba(244, 67, 54, 0.2); color: #e57373; }
        .badge.correct { background: rgba(76, 175, 80, 0.2); color: #81c784; }
        .badge.incorrect { background: rgba(244, 67, 54, 0.2); color: #e57373; }
        .badge.pending { background: rgba(255, 183, 77, 0.2); color: #ffb74d; }

        .refresh-info {
            text-align: center;
            color: #64b5f6;
            font-size: 0.9em;
            margin-top: 30px;
            padding: 20px;
        }

        .calibration-card {
            background: linear-gradient(145deg, rgba(2, 136, 209, 0.15), rgba(3, 169, 244, 0.1));
            border: 1px solid rgba(79, 195, 247, 0.3);
        }

        .calibration-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .calibration-item {
            text-align: center;
        }

        .calibration-item .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #29b6f6;
        }

        .calibration-item .label {
            color: #90caf9;
            font-size: 0.8em;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #64b5f6;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #f44336;
        }

        .mini-chart {
            height: 120px;
        }

        /* Date/Time Filter Styles */
        .filter-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: linear-gradient(145deg, rgba(13, 33, 55, 0.8), rgba(10, 25, 41, 0.9));
            border-radius: 12px;
            border: 1px solid rgba(79, 195, 247, 0.2);
            flex-wrap: wrap;
        }

        .filter-bar label {
            color: #90caf9;
            font-size: 0.9em;
        }

        .filter-bar input[type="datetime-local"] {
            background: rgba(10, 25, 41, 0.8);
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            color: #e3f2fd;
            font-size: 0.9em;
        }

        .filter-bar input[type="datetime-local"]:focus {
            outline: none;
            border-color: #29b6f6;
            box-shadow: 0 0 10px rgba(41, 182, 246, 0.3);
        }

        .filter-bar button {
            background: linear-gradient(135deg, #0288d1, #03a9f4);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .filter-bar button:hover {
            background: linear-gradient(135deg, #03a9f4, #29b6f6);
            box-shadow: 0 4px 15px rgba(3, 169, 244, 0.3);
        }

        .filter-bar button.secondary {
            background: rgba(79, 195, 247, 0.15);
            border: 1px solid rgba(79, 195, 247, 0.3);
        }

        .filter-bar button.secondary:hover {
            background: rgba(79, 195, 247, 0.25);
        }

        .filter-bar .quick-filters {
            display: flex;
            gap: 8px;
        }

        .filter-bar .quick-filters button {
            padding: 6px 12px;
            font-size: 0.8em;
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid rgba(79, 195, 247, 0.2);
        }

        .filter-bar .quick-filters button:hover,
        .filter-bar .quick-filters button.active {
            background: rgba(79, 195, 247, 0.25);
            border-color: #29b6f6;
        }

        .filter-info {
            text-align: center;
            color: #64b5f6;
            font-size: 0.85em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://shachi.mx/assets/shachi-logo-DJDvd-OT.png" alt="Shachi" class="logo">
        <h1>Shachi BTC Dashboard</h1>
        <p class="subtitle">Bitcoin Price Prediction Analytics & Correlation Analysis</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('overview')">📊 Overview</button>
        <button class="tab-btn" onclick="showTab('pro')">🎯 Pro Indicators</button>
        <button class="tab-btn" onclick="showTab('correlations')">🔗 Correlaciones</button>
        <button class="tab-btn" onclick="showTab('indicators')">📈 Indicadores</button>
        <button class="tab-btn" onclick="showTab('history')">📋 Historial</button>
    </div>

    <!-- Date/Time Filter -->
    <div class="filter-bar">
        <label>Desde:</label>
        <input type="datetime-local" id="filter-start" onchange="applyFilter()">
        <label>Hasta:</label>
        <input type="datetime-local" id="filter-end" onchange="applyFilter()">
        <button onclick="applyFilter()">Aplicar</button>
        <button class="secondary" onclick="clearFilter()">Limpiar</button>
        <div class="quick-filters">
            <button onclick="setQuickFilter('1h')">1H</button>
            <button onclick="setQuickFilter('4h')">4H</button>
            <button onclick="setQuickFilter('12h')">12H</button>
            <button onclick="setQuickFilter('24h')">24H</button>
            <button onclick="setQuickFilter('all')" class="active">Todo</button>
        </div>
    </div>
    <div id="filter-info" class="filter-info"></div>

    <div id="app">
        <div class="loading">Cargando datos...</div>
    </div>

    <script>
        let dashboardData = null;
        let charts = {};
        let currentTab = 'overview';  // Track current active tab
        let filterStart = null;  // Filter start datetime
        let filterEnd = null;    // Filter end datetime
        let activeQuickFilter = 'all';  // Track active quick filter button

        // Get filtered predictions based on current filter
        function getFilteredPredictions() {
            if (!dashboardData || !dashboardData.predictions) return [];

            let predictions = dashboardData.predictions;

            if (filterStart || filterEnd) {
                predictions = predictions.filter(p => {
                    const timestamp = new Date(p.timestamp);
                    if (filterStart && timestamp < filterStart) return false;
                    if (filterEnd && timestamp > filterEnd) return false;
                    return true;
                });
            }

            return predictions;
        }

        // Apply date filter
        function applyFilter() {
            const startInput = document.getElementById('filter-start').value;
            const endInput = document.getElementById('filter-end').value;

            filterStart = startInput ? new Date(startInput) : null;
            filterEnd = endInput ? new Date(endInput) : null;

            // Clear quick filter buttons
            document.querySelectorAll('.quick-filters button').forEach(btn => btn.classList.remove('active'));
            activeQuickFilter = 'custom';

            updateFilterInfo();
            renderDashboard();
            showTab(currentTab);
        }

        // Clear filter
        function clearFilter() {
            filterStart = null;
            filterEnd = null;
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';

            // Set "Todo" as active
            document.querySelectorAll('.quick-filters button').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.quick-filters button:last-child').classList.add('active');
            activeQuickFilter = 'all';

            updateFilterInfo();
            renderDashboard();
            showTab(currentTab);
        }

        // Set quick filter (1h, 4h, 12h, 24h, all)
        function setQuickFilter(period) {
            const now = new Date();

            // Update button states
            document.querySelectorAll('.quick-filters button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            activeQuickFilter = period;

            if (period === 'all') {
                filterStart = null;
                filterEnd = null;
                document.getElementById('filter-start').value = '';
                document.getElementById('filter-end').value = '';
            } else {
                const hours = parseInt(period);
                filterStart = new Date(now.getTime() - hours * 60 * 60 * 1000);
                filterEnd = null;  // Up to now

                // Update input fields
                document.getElementById('filter-start').value = filterStart.toISOString().slice(0, 16);
                document.getElementById('filter-end').value = '';
            }

            updateFilterInfo();
            renderDashboard();
            showTab(currentTab);
        }

        // Update filter info display
        function updateFilterInfo() {
            const infoEl = document.getElementById('filter-info');
            const filtered = getFilteredPredictions();
            const total = dashboardData ? dashboardData.predictions.length : 0;

            if (filterStart || filterEnd) {
                let rangeText = '';
                if (filterStart && filterEnd) {
                    rangeText = `${filterStart.toLocaleString()} - ${filterEnd.toLocaleString()}`;
                } else if (filterStart) {
                    rangeText = `Desde ${filterStart.toLocaleString()}`;
                } else if (filterEnd) {
                    rangeText = `Hasta ${filterEnd.toLocaleString()}`;
                }
                infoEl.innerHTML = `Filtro activo: ${rangeText} | Mostrando ${filtered.length} de ${total} predicciones`;
            } else {
                infoEl.innerHTML = '';
            }
        }

        function showTab(tabName) {
            currentTab = tabName;  // Save current tab

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');

            // Render charts for the active tab
            setTimeout(() => {
                if (tabName === 'overview') renderOverviewCharts();
                if (tabName === 'correlations') renderCorrelationCharts();
                if (tabName === 'indicators') renderIndicatorCharts();
            }, 100);
        }

        async function loadData() {
            try {
                const response = await fetch('data.json?' + Date.now());
                dashboardData = await response.json();
                renderDashboard();

                // Restore the current tab after rendering
                showTab(currentTab);
            } catch (error) {
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        Error cargando datos. Ejecuta: <code>python3 dashboard/generate_data.py</code>
                    </div>
                `;
            }
        }

        function renderLearnedWeights(weights, correlations) {
            const indicatorNames = {
                'momentum_1h': 'Momentum 1H',
                'momentum_15m': 'Momentum 15m',
                'ema_trend': 'EMA Trend',
                'price_structure': 'Price Structure',
                'zscore': 'Z-Score',
                'rsi': 'RSI',
                'orderbook': 'Order Book',
                'funding': 'Funding Rate',
                'volume_confirm': 'Volume Confirm',
                'volume_trend': 'Volume Trend',
                'bollinger': 'Bollinger'
            };

            return Object.entries(weights).map(([key, weight]) => {
                const corr = correlations[key] || 0;
                const weightClass = weight > 1.05 ? 'positive' : weight < 0.95 ? 'negative' : '';
                const corrClass = corr >= 0 ? 'positive' : 'negative';
                const weightPct = ((weight - 1) * 100).toFixed(1);
                const weightSign = weight >= 1 ? '+' : '';

                return `
                    <div class="correlation-item" style="flex-wrap: wrap;">
                        <span class="correlation-name">${indicatorNames[key] || key}</span>
                        <div style="display: flex; align-items: center; gap: 10px; flex: 1; min-width: 200px;">
                            <div class="correlation-bar-container" style="flex: 1;">
                                <div class="correlation-bar ${weight >= 1 ? 'positive' : 'negative'}"
                                     style="width: ${Math.min(Math.abs(weight - 1) * 200, 100)}%"></div>
                            </div>
                            <span class="correlation-value ${weightClass}" style="min-width: 80px;">
                                ${weight.toFixed(3)}x
                            </span>
                        </div>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span style="color: #90caf9; font-size: 0.8em;">corr:</span>
                            <span class="correlation-value ${corrClass}" style="min-width: 60px; font-size: 0.9em;">
                                ${corr >= 0 ? '+' : ''}${corr.toFixed(3)}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderDashboard() {
            const stats = dashboardData.statistics;
            const calibration = dashboardData.calibration;
            const correlations = dashboardData.correlations || {};
            const accuracyClass = stats.direction_accuracy >= 60 ? 'positive' : stats.direction_accuracy >= 40 ? 'neutral' : 'negative';

            // Calculate filtered statistics dynamically
            const filteredPredictions = getFilteredPredictions();
            const filteredEvaluated = filteredPredictions.filter(p => p.actual_close !== null && p.direction !== 'NO_TRADE');
            const filteredNoTrade = filteredPredictions.filter(p => p.direction === 'NO_TRADE').length;

            // Calculate Win Rate and P&L from filtered data
            const filteredWins = filteredEvaluated.filter(p => p.pnl_pct > 0).length;
            const filteredLosses = filteredEvaluated.filter(p => p.pnl_pct < 0).length;
            const filteredWinRate = (filteredWins + filteredLosses) > 0
                ? ((filteredWins / (filteredWins + filteredLosses)) * 100).toFixed(1)
                : 0;
            const filteredPnl = filteredEvaluated.reduce((sum, p) => sum + (p.pnl_pct || 0), 0).toFixed(2);
            const filteredTradesCount = filteredEvaluated.length;

            // Calculate filtered direction accuracy
            const filteredDirectionCorrect = filteredEvaluated.filter(p => p.direction_correct).length;
            const filteredDirAccuracy = filteredEvaluated.length > 0
                ? ((filteredDirectionCorrect / filteredEvaluated.length) * 100).toFixed(1)
                : 0;

            // Determine label for filtered stats
            const isFiltered = filterStart || filterEnd;
            const filterLabel = isFiltered ? 'filtrado' : 'total';

            document.getElementById('app').innerHTML = `
                <!-- OVERVIEW TAB -->
                <div id="tab-overview" class="tab-content active">
                    <div class="stats-grid">
                        <div class="stat-card neutral">
                            <div class="value">${filteredPredictions.length}</div>
                            <div class="label">Trades ${isFiltered ? '(filtrado)' : ''}</div>
                        </div>
                        <div class="stat-card" style="background: rgba(97, 97, 97, 0.3);">
                            <div class="value" style="color: #9e9e9e;">${filteredNoTrade}</div>
                            <div class="label">No Trade</div>
                        </div>
                        <div class="stat-card neutral">
                            <div class="value">${filteredTradesCount}</div>
                            <div class="label">Evaluadas</div>
                        </div>
                        <div class="stat-card ${filteredDirAccuracy >= 60 ? 'positive' : filteredDirAccuracy >= 40 ? 'neutral' : 'negative'}">
                            <div class="value">${filteredDirAccuracy}%</div>
                            <div class="label">Precisión Dir.</div>
                        </div>
                        <div class="stat-card ${filteredWinRate >= 50 ? 'positive' : 'negative'}">
                            <div class="value">${filteredWinRate}%</div>
                            <div class="label">Win Rate (${filteredTradesCount} ${filterLabel})</div>
                        </div>
                        <div class="stat-card ${filteredPnl >= 0 ? 'positive' : 'negative'}">
                            <div class="value">${filteredPnl >= 0 ? '+' : ''}${filteredPnl}%</div>
                            <div class="label">P&L (${filteredTradesCount} ${filterLabel})</div>
                        </div>
                    </div>

                    <div class="chart-card calibration-card">
                        <h2>⚙️ Estado de Calibración</h2>
                        <div class="calibration-grid">
                            <div class="calibration-item">
                                <div class="value">$${calibration.bias >= 0 ? '+' : ''}${calibration.bias.toFixed(2)}</div>
                                <div class="label">Bias</div>

        function renderOverviewCharts() {
            const predictions = getFilteredPredictions();

            // Destroy existing charts
            Object.values(charts).forEach(chart => chart.destroy?.());
            charts = {};

            // Main Chart
            const mainCtx = document.getElementById('mainChart')?.getContext('2d');
            if (mainCtx) {
                charts.main = new Chart(mainCtx, {
                    type: 'line',
                    data: {
                        labels: evaluated.map(p => new Date(p.timestamp)),
                        datasets: [
                            {
                                label: 'Predicción',
                                data: evaluated.map(p => p.predicted_close),
                                borderColor: '#29b6f6',
                                backgroundColor: 'rgba(41, 182, 246, 0.1)',
                                borderWidth: 2,
                                pointRadius: 4,
                                tension: 0.1
                            },
                            {
                                label: 'Cierre Real',
                                data: evaluated.map(p => p.actual_close),
                                borderColor: '#f44336',
                                backgroundColor: 'rgba(244, 67, 54, 0.1)',
                                borderWidth: 2,
                                pointRadius: 4,
                                tension: 0.1
                            }
                        ]
                    },
                    options: getChartOptions('$')
                });
            }

            // Deviation Chart
            const devCtx = document.getElementById('deviationChart')?.getContext('2d');
            if (devCtx) {
                charts.deviation = new Chart(devCtx, {
                    type: 'bar',
                    data: {
                        labels: evaluated.slice(-15).map((p, i) => `#${i + 1}`),
                        datasets: [{
                            label: 'Desviación %',
                            data: evaluated.slice(-15).map(p => p.deviation_pct),
                            backgroundColor: evaluated.slice(-15).map(p =>
                                p.deviation_pct >= 0 ? 'rgba(76, 175, 80, 0.6)' : 'rgba(244, 67, 54, 0.6)'
                            )
                        }]
                    },
                    options: { ...getChartOptions('%'), plugins: { legend: { display: false } } }
                });
            }

            // Outcome Chart
            const outcomes = dashboardData.statistics.outcomes;
            const outcomeCtx = document.getElementById('outcomeChart')?.getContext('2d');
            if (outcomeCtx && Object.keys(outcomes).length > 0) {
                charts.outcome = new Chart(outcomeCtx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(outcomes),
                        datasets: [{
                            data: Object.values(outcomes),
                            backgroundColor: ['#4caf50', '#f44336', '#ffb74d', '#29b6f6', '#0288d1']
                        }]

                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'right', labels: { color: '#e3f2fd' } } }
                    }
                });
            }

            // P&L Chart
            let cumPnl = 0;
            const pnlData = evaluated.map(p => { cumPnl += p.pnl_pct; return cumPnl; });
            const pnlCtx = document.getElementById('pnlChart')?.getContext('2d');
            if (pnlCtx) {
                const finalPnl = pnlData[pnlData.length - 1] || 0;
                charts.pnl = new Chart(pnlCtx, {
                    type: 'line',
                    data: {
                        labels: evaluated.map(p => new Date(p.timestamp)),
                        datasets: [{
                            label: 'P&L Acumulado %',
                            data: pnlData,
                            borderColor: finalPnl >= 0 ? '#4caf50' : '#f44336',
                            backgroundColor: finalPnl >= 0 ? 'rgba(76, 175, 80, 0.1)' : 'rgba(244, 67, 54, 0.1)',
                            fill: true,
                            tension: 0.1
                        }]
                    },
                    options: { ...getChartOptions('%'), plugins: { legend: { display: false } } }
                });
            }
        }

                        scales: { r: { ticks: { display: false }, grid: { color: 'rgba(79,195,247,0.1)' } } }
                    }
                });

                    },
                    y: {
                        ticks: { color: '#64b5f6', callback: v => suffix === '$' ? '$' + v.toLocaleString() : v.toFixed(1) + suffix },
                        grid: { color: 'rgba(79,195,247,0.1)' }
                    }
                }
            };
        }

        // Initial load
        loadData();

        // Auto refresh every 30 seconds for more responsive updates
        setInterval(loadData, 30000);

        // Also refresh when tab becomes visible (in case user switched away)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                loadData();
            }
        });
    </script>
</body>
</html>
